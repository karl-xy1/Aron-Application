name: Build iOS IPA
on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./Aron-AI-Assistant-main
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build App (IPA)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release archive -archivePath App.xcarchive

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: Aron-AI-Assistant-main/ios/App/App.xcarchive
